name: Build Android App

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Setup Java (Android SDK requirement)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor CLI & Core
      run: |
        npm install @capacitor/core @capacitor/android @capacitor/camera
        npm install -D @capacitor/cli

    - name: Init and Add Android Platform
      run: |
        npx cap init LamaiFarm com.lamai.farm --web-dir dist
        npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
